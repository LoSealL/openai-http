name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --extra=cpu --dev
      - run: uv run pytest tests/ --cov=openai_http --cov-report=xml --cov-report=term
      - uses: codecov/codecov-action@v7
        if: always()
        with:
          files: coverage.xml
