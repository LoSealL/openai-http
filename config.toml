# OpenAI-Compatible HTTP API Service Configuration
# Environment variables with OPENAI_HTTP__ prefix override these values

[server]
host = "0.0.0.0"
port = 8000

[auth]
enabled = false
api_keys = []  # Add API keys when auth.enabled = true

[queue]
depth = 32  # Max requests in queue before returning 429

[observability]
log_level = "info"
log_format = "json"  # "json" or "text"
