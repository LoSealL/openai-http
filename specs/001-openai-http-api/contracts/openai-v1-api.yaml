openapi: 3.1.0
info:
  title: OpenAI-Compatible API
  version: 1.0.0
  description: |
    OpenAI v1 API-compatible HTTP service backed by a pluggable inference engine
    (default: HuggingFace Transformers).

servers:
  - url: http://localhost:8000
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimit:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    Model:
      type: object
      properties:
        id:
          type: string
          example: gpt-4
        object:
          type: string
          enum: [model]
        created:
          type: integer
          example: 1700000000
        owned_by:
          type: string
          example: local

    ModelList:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/Model"

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: "null"
        name:
          type: string
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
        tool_call_id:
          type: string

    ToolCall:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [function]
        function:
          $ref: "#/components/schemas/FunctionCall"

    FunctionCall:
      type: object
      properties:
        name:
          type: string
        arguments:
          type: string

    Tool:
      type: object
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            parameters:
              type: object
            strict:
              type: boolean

    UsageInfo:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          minItems: 1
        temperature:
          type: [number, "null"]
          default: 1.0
          minimum: 0
          maximum: 2
        top_p:
          type: [number, "null"]
          default: 1.0
          minimum: 0
          maximum: 1
        n:
          type: integer
          default: 1
          minimum: 1
          maximum: 128
        stream:
          type: boolean
          default: false
        stop:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
              maxItems: 4
            - type: "null"
        max_tokens:
          type: [integer, "null"]
          minimum: 1
          maximum: 131072
        presence_penalty:
          type: number
          default: 0
          minimum: -2
          maximum: 2
        frequency_penalty:
          type: number
          default: 0
          minimum: -2
          maximum: 2
        logit_bias:
          type: [object, "null"]
          additionalProperties:
            type: number
        logprobs:
          type: boolean
          default: false
        top_logprobs:
          type: [integer, "null"]
          minimum: 0
          maximum: 20
        response_format:
          type: [object, "null"]
        seed:
          type: [integer, "null"]
        tools:
          type: [array, "null"]
          items:
            $ref: "#/components/schemas/Tool"
        tool_choice:
          oneOf:
            - type: string
              enum: [auto, none, required]
            - type: object
            - type: "null"
        user:
          type: string
        stream_options:
          type: [object, "null"]
          properties:
            include_usage:
              type: boolean
      additionalProperties: true

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
          example: chatcmpl-abc123
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
        model:
          type: string
        system_fingerprint:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: "#/components/schemas/ChatMessage"
              logprobs:
                type: [object, "null"]
              finish_reason:
                type: [string, "null"]
                enum: [stop, length, tool_calls, content_filter, null]
        usage:
          $ref: "#/components/schemas/UsageInfo"
        service_tier:
          type: [string, "null"]

    ChatCompletionChunk:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion.chunk]
        created:
          type: integer
        model:
          type: string
        system_fingerprint:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              delta:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: [string, "null"]
                  tool_calls:
                    type: array
                    items:
                      $ref: "#/components/schemas/ToolCall"
              logprobs:
                type: [object, "null"]
              finish_reason:
                type: [string, "null"]
        usage:
          $ref: "#/components/schemas/UsageInfo"

    CompletionRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
        prompt:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: array
              items:
                type: integer
            - type: array
              items:
                type: array
                items:
                  type: integer
        suffix:
          type: [string, "null"]
        max_tokens:
          type: integer
          default: 16
          minimum: 1
          maximum: 131072
        temperature:
          type: [number, "null"]
          default: 1.0
        top_p:
          type: [number, "null"]
          default: 1.0
        n:
          type: integer
          default: 1
          minimum: 1
          maximum: 128
        stream:
          type: boolean
          default: false
        logprobs:
          type: [integer, "null"]
          minimum: 0
          maximum: 5
        echo:
          type: boolean
          default: false
        stop:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        presence_penalty:
          type: number
          default: 0
        frequency_penalty:
          type: number
          default: 0
        best_of:
          type: integer
          default: 1
        logit_bias:
          type: [object, "null"]
        user:
          type: string
      additionalProperties: true

    CompletionResponse:
      type: object
      properties:
        id:
          type: string
          example: cmpl-abc123
        object:
          type: string
          enum: [text_completion]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              index:
                type: integer
              logprobs:
                type: [object, "null"]
              finish_reason:
                type: [string, "null"]
        usage:
          $ref: "#/components/schemas/UsageInfo"
        system_fingerprint:
          type: string

    EmbeddingRequest:
      type: object
      required: [input, model]
      properties:
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: array
              items:
                type: integer
            - type: array
              items:
                type: array
                items:
                  type: integer
        model:
          type: string
        encoding_format:
          type: string
          enum: [float, base64]
          default: float
        dimensions:
          type: [integer, "null"]
        user:
          type: string

    EmbeddingObject:
      type: object
      properties:
        object:
          type: string
          enum: [embedding]
        index:
          type: integer
        embedding:
          oneOf:
            - type: array
              items:
                type: number
            - type: string

    EmbeddingResponse:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/EmbeddingObject"
        model:
          type: string
        usage:
          $ref: "#/components/schemas/UsageInfo"

    FileObject:
      type: object
      properties:
        id:
          type: string
          example: file-abc123
        object:
          type: string
          enum: [file]
        bytes:
          type: integer
        created_at:
          type: integer
        filename:
          type: string
        purpose:
          type: string
          enum: [fine-tune, assistants, batch]
        status:
          type: string
          enum: [uploaded, processed, error]
        status_details:
          type: [string, "null"]

    FileList:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/FileObject"

    FineTuningJob:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [fine_tuning.job]
        created_at:
          type: integer
        finished_at:
          type: [integer, "null"]
        model:
          type: string
        fine_tuned_model:
          type: [string, "null"]
        organization_id:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled]
        hyperparameters:
          type: object
          properties:
            n_epochs:
              type: [integer, "null"]
            batch_size:
              type: [integer, "null"]
            learning_rate_multiplier:
              type: [number, "null"]
        training_file:
          type: string
        validation_file:
          type: [string, "null"]
        result_files:
          type: array
          items:
            type: string
        trained_tokens:
          type: [integer, "null"]
        error:
          type: [object, "null"]
          properties:
            code:
              type: string
            message:
              type: string
        seed:
          type: integer
        method:
          type: [object, "null"]

    FineTuningJobList:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/FineTuningJob"

    BatchRequest:
      type: object
      required: [input_file_id, endpoint, completion_window]
      properties:
        input_file_id:
          type: string
        endpoint:
          type: string
        completion_window:
          type: string
          default: "24h"
        metadata:
          type: [object, "null"]

    BatchJob:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [batch]
        endpoint:
          type: string
        input_file_id:
          type: string
        output_file_id:
          type: [string, "null"]
        error_file_id:
          type: [string, "null"]
        status:
          type: string
          enum:
            - validating
            - failed
            - in_progress
            - finalizing
            - completed
            - expired
            - cancelling
            - cancelled
        created_at:
          type: integer
        completed_at:
          type: [integer, "null"]
        expires_at:
          type: integer
        request_counts:
          type: [object, "null"]
          properties:
            total:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
        metadata:
          type: [object, "null"]

    BatchList:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/BatchJob"

    ModerationResponse:
      type: object
      properties:
        id:
          type: string
        model:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              flagged:
                type: boolean
              categories:
                type: object
              category_scores:
                type: object

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
              enum:
                - invalid_request_error
                - authentication_error
                - not_found_error
                - rate_limit_error
                - server_error
                - invalid_api_key
            param:
              type: [string, "null"]
            code:
              type: [string, integer, "null"]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        models:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              status:
                type: string
        backend_type:
          type: string
        uptime_seconds:
          type: number

    TranscriptionResponse:
      type: object
      properties:
        text:
          type: string

    TranslationResponse:
      type: object
      properties:
        text:
          type: string

    ImageGenerationResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: [string, "null"]
              b64_json:
                type: [string, "null"]
              revised_prompt:
                type: [string, "null"]

security:
  - BearerAuth: []

paths:
  /v1/models:
    get:
      summary: List models
      operationId: listModels
      responses:
        "200":
          description: List of available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"

  /v1/models/{model_id}:
    get:
      summary: Retrieve a model
      operationId: retrieveModel
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Model object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/chat/completions:
    post:
      summary: Create chat completion
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Chat completion response (or SSE stream)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ChatCompletionChunk"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/completions:
    post:
      summary: Create completion
      operationId: createCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Completion response (or SSE stream)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimit"

  /v1/embeddings:
    post:
      summary: Create embeddings
      operationId: createEmbeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingRequest"
      responses:
        "200":
          description: Embedding response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/moderations:
    post:
      summary: Create moderation
      operationId: createModeration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                model:
                  type: string
      responses:
        "200":
          description: Moderation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationResponse"

  /v1/files:
    post:
      summary: Upload file
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
      responses:
        "200":
          description: File object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileObject"
    get:
      summary: List files
      operationId: listFiles
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileList"

  /v1/files/{file_id}:
    get:
      summary: Retrieve file
      operationId: retrieveFile
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileObject"
    delete:
      summary: Delete file
      operationId: deleteFile
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletion confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean

  /v1/files/{file_id}/content:
    get:
      summary: Retrieve file content
      operationId: retrieveFileContent
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /v1/fine_tuning/jobs:
    post:
      summary: Create fine-tuning job
      operationId: createFineTuningJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [training_file, model]
              properties:
                model:
                  type: string
                training_file:
                  type: string
                validation_file:
                  type: [string, "null"]
                hyperparameters:
                  type: [object, "null"]
                suffix:
                  type: [string, "null"]
                seed:
                  type: [integer, "null"]
                method:
                  type: [object, "null"]
      responses:
        "200":
          description: Fine-tuning job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FineTuningJob"
    get:
      summary: List fine-tuning jobs
      operationId: listFineTuningJobs
      responses:
        "200":
          description: Fine-tuning job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FineTuningJobList"

  /v1/fine_tuning/jobs/{job_id}:
    get:
      summary: Retrieve fine-tuning job
      operationId: retrieveFineTuningJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fine-tuning job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FineTuningJob"

  /v1/fine_tuning/jobs/{job_id}/cancel:
    post:
      summary: Cancel fine-tuning job
      operationId: cancelFineTuningJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FineTuningJob"

  /v1/fine_tuning/jobs/{job_id}/events:
    get:
      summary: List fine-tuning events
      operationId: listFineTuningEvents
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        object:
                          type: string
                          enum: [fine_tuning.job.event]
                        created_at:
                          type: integer
                        level:
                          type: string
                          enum: [info, warn, error]
                        message:
                          type: string

  /v1/audio/transcriptions:
    post:
      summary: Create transcription
      operationId: createTranscription
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                model:
                  type: string
                language:
                  type: string
                prompt:
                  type: string
                response_format:
                  type: string
                  enum: [json, text, srt, verbose_json, vtt]
                temperature:
                  type: number
      responses:
        "200":
          description: Transcription result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptionResponse"
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/audio/translations:
    post:
      summary: Create translation
      operationId: createTranslation
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                model:
                  type: string
                prompt:
                  type: string
                response_format:
                  type: string
                  enum: [json, text, srt, verbose_json, vtt]
                temperature:
                  type: number
      responses:
        "200":
          description: Translation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationResponse"
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/images/generations:
    post:
      summary: Create image
      operationId: createImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                model:
                  type: string
                n:
                  type: integer
                  default: 1
                quality:
                  type: string
                  enum: [standard, hd]
                response_format:
                  type: string
                  enum: [url, b64_json]
                size:
                  type: string
                style:
                  type: string
                  enum: [vivid, natural]
                user:
                  type: string
      responses:
        "200":
          description: Image generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResponse"
        "501":
          description: Not implemented
